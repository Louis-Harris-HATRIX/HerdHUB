{% extends 'base.html' %}
{% set title = 'Sign in' %}
{% block content %}
<div class="bh-login-wrap">
  <div class="card bh-login-card p-4 p-lg-5">
    <div class="bh-login-header mb-4 text-center">
      <img class="bh-logo-sm mb-2" src="{{ url_for('static', filename='branding/boerhub-logo.png') }}" alt="BoerHUB logo">
      <h2 class="h5 mb-0">Sign in to BoerHUB</h2>
    </div>
    <form method="post" action="{{ url_for('login') }}" novalidate>
      <input type="hidden" name="next" value="{{ request.args.get('next', request.form.get('next', '')) }}">
      <div class="mb-3">
        <label class="form-label" for="username">Username</label>
        <input class="form-control" id="username" name="username" required autocomplete="username" autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label" for="password">Password</label>
        <div class="bh-password-field">
          <input class="form-control" id="password" type="password" name="password" required autocomplete="current-password">
          <button
            class="bh-password-toggle"
            type="button"
            data-password-toggle
            data-target="password"
            aria-label="Show password"
            aria-pressed="false"
          >
            <i data-lucide="eye"></i>
          </button>
        </div>
      </div>
      <button class="btn btn-primary w-100" type="submit">Sign in</button>
    </form>
  </div>
</div>
{% endblock %}
