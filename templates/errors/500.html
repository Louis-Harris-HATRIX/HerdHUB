{% extends 'base.html' %}
{% set title = 'Server error' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8">
    <div class="card p-4 text-center">
      <h3 class="mb-3">Something went wrong</h3>
      <p class="text-muted">A server error occurred. Please return to the dashboard and try again.</p>
      <a class="btn btn-primary" href="{{ url_for('dashboard') }}">Back to dashboard</a>
    </div>
  </div>
</div>
{% endblock %}
